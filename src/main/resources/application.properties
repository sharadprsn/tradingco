# Server Configuration
server.port=8080

# Spring Boot Application Name
spring.application.name=kite-trading

# Zerodha Kite API Configuration
kite.api-key=${KITE_API_KEY:your-api-key}
kite.api-secret=${KITE_API_SECRET:your-api-secret}
kite.base-url=${KITE_BASE_URL:https://api.kite.trade}
kite.login-url=${KITE_LOGIN_URL:https://kite.zerodha.com/connect/login}
kite.redirect-url=${KITE_REDIRECT_URL:http://localhost:8080/api/v1/auth/callback}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.com.kite.trading=INFO
logging.level.org.springframework.web.reactive=DEBUG

# HTTP Log Forwarding (optional – set the URL to enable)
# Logs at WARN+ level are POSTed as JSON to this endpoint.
logging.http.url=${LOG_HTTP_URL:}
logging.http.level=${LOG_HTTP_LEVEL:WARN}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
