# Server Configuration
server.port=8080

# Spring Boot Application Name
spring.application.name=kite-trading

# Zerodha Kite API Configuration
kite.api-key=${KITE_API_KEY:your-api-key}
kite.api-secret=${KITE_API_SECRET:your-api-secret}
kite.base-url=${KITE_BASE_URL:https://api.kite.trade}
kite.login-url=${KITE_LOGIN_URL:https://kite.zerodha.com/connect/login}
kite.redirect-url=${KITE_REDIRECT_URL:http://localhost:8080/api/v1/auth/callback}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.com.kite.trading=INFO
logging.level.org.springframework.web.reactive=DEBUG

# HTTP Log Forwarding (optional – set the URL to enable)
# Logs at WARN+ level are POSTed as JSON to this endpoint.
logging.http.url=${LOG_HTTP_URL:}
logging.http.level=${LOG_HTTP_LEVEL:WARN}

# Strategy Configuration
strategy.enabled=${STRATEGY_ENABLED:false}
strategy.nifty-futures-token=${STRATEGY_NIFTY_TOKEN:256265}
strategy.deployed-capital=${STRATEGY_CAPITAL:1000000}
strategy.atr-period=${STRATEGY_ATR_PERIOD:14}
strategy.trailing-sl-multiplier=${STRATEGY_TRAILING_SL:3}
strategy.initial-sl-percentage=${STRATEGY_INITIAL_SL:0.5}
strategy.lot-size=${STRATEGY_LOT_SIZE:50}
strategy.strike-interval=${STRATEGY_STRIKE_INTERVAL:50}
strategy.interval=${STRATEGY_INTERVAL:15minute}
strategy.candle-lookback=${STRATEGY_CANDLE_LOOKBACK:30}

# NSE Option Chain Configuration
nse.option-chain-url=${NSE_OPTION_CHAIN_URL:https://www.nseindia.com/api/option-chain-indices?symbol=NIFTY}
nse.home-url=${NSE_HOME_URL:https://www.nseindia.com}
nse.user-agent=${NSE_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36}

# Telegram Bot Configuration
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
telegram.base-url=${TELEGRAM_BASE_URL:https://api.telegram.org}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
