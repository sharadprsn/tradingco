# Server Configuration
server.port=443
server.ssl.key-store=${SERVER_SSL_KEY_STORE:keystore.p12}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:changeme}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:tomcat}

# Spring Boot Application Name
spring.application.name=kite-trading

application.version=1.0.0

# Zerodha Kite API Configuration
kite.api-key=${KITE_API_KEY:your-api-key}
kite.api-secret=${KITE_API_SECRET:your-api-secret}
kite.base-url=${KITE_BASE_URL:https://api.kite.trade}
kite.login-url=${KITE_LOGIN_URL:https://kite.zerodha.com/connect/login}
kite.redirect-url=${KITE_REDIRECT_URL:https://localhost:443/api/v1/auth/callback}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.com.kite.trading=INFO
logging.level.org.springframework.web.reactive=DEBUG

# HTTP Log Forwarding (optional – set the URL to enable)
# Logs at WARN+ level are POSTed as JSON to this endpoint.
logging.http.url=${LOG_HTTP_URL:}
logging.http.level=${LOG_HTTP_LEVEL:WARN}

# Strategy Configuration
strategy.enabled=${STRATEGY_ENABLED:false}
strategy.nifty-futures-token=${STRATEGY_NIFTY_TOKEN:256265}
strategy.deployed-capital=${STRATEGY_CAPITAL:1000000}
strategy.atr-period=${STRATEGY_ATR_PERIOD:14}
strategy.trailing-sl-multiplier=${STRATEGY_TRAILING_SL:3}
strategy.initial-sl-percentage=${STRATEGY_INITIAL_SL:0.5}
strategy.lot-size=${STRATEGY_LOT_SIZE:50}
strategy.strike-interval=${STRATEGY_STRIKE_INTERVAL:50}
strategy.interval=${STRATEGY_INTERVAL:15minute}
strategy.candle-lookback=${STRATEGY_CANDLE_LOOKBACK:30}

# NSE Option Chain Configuration
nse.option-chain-url=${NSE_OPTION_CHAIN_URL:https://www.nseindia.com/api/option-chain-v3?type=Indices&symbol=NIFTY}
nse.contract-info-url=${NSE_CONTRACT_INFO_URL:https://www.nseindia.com/api/option-chain-contract-info?symbol=NIFTY}
nse.home-url=${NSE_HOME_URL:https://www.nseindia.com/option-chain}
nse.user-agent=${NSE_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36}

# Telegram Bot Configuration
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
telegram.base-url=${TELEGRAM_BASE_URL:https://api.telegram.org}

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/oi_snapshots;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# ML Sidecar Configuration
ml.sidecar.url=${ML_SIDECAR_URL:http://ml-sidecar:8000}
ml.sidecar.enabled=${ML_SIDECAR_ENABLED:false}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
