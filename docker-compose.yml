services:
  kite-trading:
    image: sharadprsn/kite-trading:latest
    container_name: kite-trading
    ports:
      - "443:443"
    environment:
      - KITE_API_KEY=${KITE_API_KEY}
      - KITE_API_SECRET=${KITE_API_SECRET}
      - KITE_BASE_URL=${KITE_BASE_URL:-https://api.kite.trade}
      - KITE_LOGIN_URL=${KITE_LOGIN_URL:-https://kite.zerodha.com/connect/login}
      - KITE_REDIRECT_URL=${KITE_REDIRECT_URL:-http://localhost:443/api/v1/auth/callback}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_BASE_URL=${TELEGRAM_BASE_URL:-https://api.telegram.org}
      - APP_BASE_URL=${APP_BASE_URL:-https://92.4.88.249:443}
      - ML_ENABLED=${ML_ENABLED:-true}
      - OPENALGO_BASE_URL=http://openalgo:5000
      - OPENALGO_API_KEY=${OPENALGO_API_KEY}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      openalgo:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:443/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  openalgo:
    image: marketcalls/openalgo:latest
    container_name: openalgo
    ports:
      - "5000:5000"
      - "8765:8765"
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./openalgo-data/db:/app/db
      - ./openalgo-data/log:/app/log
    restart: unless-stopped
