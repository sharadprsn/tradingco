services:
  nse-ohlc-api:
    image: sharadprsn/nse-ohlc-api:latest
    container_name: nse-ohlc-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  kite-trading:
    image: sharadprsn/kite-trading:latest
    container_name: kite-trading
    depends_on:
      nse-ohlc-api:
        condition: service_healthy
    ports:
      - "443:443"
    environment:
      - KITE_API_KEY=${KITE_API_KEY:-rmospjxnq8qpj58t}
      - KITE_API_SECRET=${KITE_API_SECRET:-2rkggq74y8hfec93jb76vge0wq2swwh3}
      - KITE_BASE_URL=${KITE_BASE_URL:-https://api.kite.trade}
      - KITE_LOGIN_URL=${KITE_LOGIN_URL:-https://kite.zerodha.com/connect/login}
      - KITE_REDIRECT_URL=${KITE_REDIRECT_URL:-https://92.4.88.249:443/api/v1/auth/callback}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_BASE_URL=${TELEGRAM_BASE_URL:-https://api.telegram.org}
      - APP_BASE_URL=${APP_BASE_URL:-https://92.4.88.249:443}
      - LOG_HTTP_URL=${LOG_HTTP_URL}
      - LOG_HTTP_LEVEL=${LOG_HTTP_LEVEL:-WARN}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost:443/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


